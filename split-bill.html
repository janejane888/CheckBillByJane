<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="หารบิล">
<title>หารบิล — เจน & กอหญ้า</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --surface2: #f3ede4;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1410;
  --text2: #7a6e62;
  --text3: #b0a496;
  --coral: #ff6b4a;
  --coral-dim: rgba(255,107,74,0.1);
  --teal: #00a896;
  --teal-dim: rgba(0,168,150,0.1);
  --gold: #f4a624;
  --gold-dim: rgba(244,166,36,0.1);
  --rose: #e8547a;
  --rose-dim: rgba(232,84,122,0.1);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Prompt', sans-serif; min-height: 100vh; padding-bottom: 90px; }

/* Header */
.header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 20px 16px 14px; position: sticky; top: 0; z-index: 50; }
.header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); background: var(--surface); }
.tab { flex: 1; padding: 11px 4px; font-size: 13px; font-family: inherit; font-weight: 400; border: none; background: none; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--coral); border-bottom-color: var(--coral); font-weight: 500; }

/* Pages */
.page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }

/* Session card */
.session-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; margin-bottom: 12px; }
.session-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.session-date { font-size: 11px; color: var(--text3); }
.session-total { font-size: 22px; font-weight: 600; color: var(--coral); margin: 10px 0 6px; }

/* Settlement box */
.settle-box { border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
.settle-box.owe { background: var(--rose-dim); }
.settle-box.even { background: var(--teal-dim); }
.settle-icon { font-size: 22px; }
.settle-text { font-size: 14px; font-weight: 500; }
.settle-text span { font-size: 18px; font-weight: 600; }
.settle-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Items in session */
.item-list { margin-top: 10px; }
.item-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.item-row:last-child { border-bottom: none; }
.item-who { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; margin-right: 6px; }
.who-jane { background: var(--coral-dim); color: var(--coral); }
.who-korya { background: var(--teal-dim); color: var(--teal); }
.who-other { background: var(--gold-dim); color: var(--gold); }
.item-name { color: var(--text); flex: 1; }
.item-amt { font-weight: 500; color: var(--text); white-space: nowrap; margin-left: 8px; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px 6px; border-radius: 6px; font-size: 14px; margin-left: 4px; }
.del-btn:active { color: var(--coral); }

/* Form */
.form-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; margin-bottom: 12px; }
.form-title { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 14px; }
label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; margin-top: 12px; }
label:first-child { margin-top: 0; }
input, select { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; font-family: inherit; padding: 10px 12px; outline: none; -webkit-appearance: none; }
input:focus, select:focus { border-color: var(--coral); }
select option { background: #fff; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; margin-top: 14px; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-coral { background: var(--coral); color: #fff; }
.btn-teal { background: var(--teal); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border2); margin-top: 8px; }
.btn-danger { background: #fff0ee; color: var(--coral); border: 0.5px solid var(--coral); margin-top: 8px; }

/* Member chips */
.member-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; font-family: inherit; }
.chip-jane { background: var(--coral-dim); color: var(--coral); border-color: transparent; }
.chip-jane.selected { border-color: var(--coral); }
.chip-korya { background: var(--teal-dim); color: var(--teal); border-color: transparent; }
.chip-korya.selected { border-color: var(--teal); }
.chip-other { background: var(--gold-dim); color: var(--gold); border-color: transparent; }
.chip-other.selected { border-color: var(--gold); }

/* Summary bar */
.summary-bar { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 12px; display: flex; gap: 16px; overflow-x: auto; }
.sum-item { text-align: center; min-width: 70px; }
.sum-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
.sum-val { font-size: 18px; font-weight: 600; }
.sum-val.coral { color: var(--coral); }
.sum-val.teal { color: var(--teal); }
.sum-val.gold { color: var(--gold); }

/* Nav */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(250,247,242,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid var(--border2); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px; cursor: pointer; color: var(--text3); font-size: 10px; gap: 3px; font-family: inherit; border: none; background: none; transition: color 0.2s; }
.nav-item.active { color: var(--coral); }
.nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* Empty */
.empty { text-align: center; color: var(--text3); font-size: 13px; padding: 32px 0; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }

/* Toast */
#toast { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--bg); font-size: 13px; padding: 10px 20px; border-radius: 20px; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 200; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Session header row */
.session-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
.tag { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.tag-open { background: var(--gold-dim); color: var(--gold); }
.tag-closed { background: var(--teal-dim); color: var(--teal); }

/* Divider */
hr { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }
</style>
</head>
<body>

<div id="toast"></div>

<div class="header">
  <div class="header-title">💸 หารบิล</div>
  <div class="header-sub">เจน & กอหญ้า</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('add')">+ เพิ่มรายการ</button>
  <button class="tab" onclick="showTab('sessions')">บิลทั้งหมด</button>
  <button class="tab" onclick="showTab('summary')">สรุปรวม</button>
</div>

<!-- ADD TAB -->
<div id="tab-add" class="page active">

  <!-- Current session -->
  <div class="form-card" id="current-session-card">
    <div class="form-title">📋 บิลปัจจุบัน</div>
    <label>ชื่อบิล / วันนี้ไปไหน</label>
    <input type="text" id="session-name" placeholder="เช่น ข้าวเย็น MBK, ชาบูด้วยกัน">
    <label>วันที่</label>
    <input type="date" id="session-date">
    <label>สมาชิก</label>
    <div style="font-size:12px;color:var(--text3);margin-top:4px">เจน & กอหญ้า จะถูกใส่เสมอ เพิ่มคนอื่นได้ถ้ามี</div>
    <input type="text" id="extra-members" placeholder="ชื่อคนอื่น คั่นด้วยจุลภาค เช่น มิ้น, เบส" style="margin-top:8px">
  </div>

  <div class="form-card">
    <div class="form-title">➕ เพิ่มรายการ</div>
    <label>รายการ</label>
    <input type="text" id="item-name" placeholder="เช่น ค่าอาหาร, ของหวาน, น้ำ">
    <div class="row2">
      <div>
        <label>ใครจ่าย</label>
        <select id="item-payer"></select>
      </div>
      <div>
        <label>จำนวน (บาท)</label>
        <input type="number" id="item-amt" placeholder="0" inputmode="decimal">
      </div>
    </div>
    <label>ใครร่วมจ่ายบ้าง (เลือกได้หลายคน)</label>
    <div class="member-chips" id="participant-chips"></div>
    <button class="btn btn-coral" onclick="addItem()">+ เพิ่มรายการนี้</button>
  </div>

  <!-- Live preview -->
  <div class="form-card" id="preview-card">
    <div class="form-title">🧾 รายการในบิลนี้</div>
    <div id="preview-list"><div class="empty" style="padding:16px 0"><div class="empty-icon">🍽️</div>ยังไม่มีรายการ</div></div>
    <div id="preview-settle" style="display:none"></div>
    <button class="btn btn-teal" onclick="saveSession()" style="margin-top:14px">✓ บันทึกบิลนี้</button>
    <button class="btn btn-ghost" onclick="clearCurrent()">ล้างรายการทั้งหมด</button>
  </div>
</div>

<!-- SESSIONS TAB -->
<div id="tab-sessions" class="page">
  <div id="sessions-list"></div>
</div>

<!-- SUMMARY TAB -->
<div id="tab-summary" class="page">
  <div class="summary-bar" id="summary-totals"></div>
  <div class="form-card" id="summary-settle"></div>
  <div id="summary-sessions"></div>
</div>

<script>
const K = { sessions:'split_sessions', current:'split_current' };
let sessions = JSON.parse(localStorage.getItem(K.sessions)||'[]');
let current = JSON.parse(localStorage.getItem(K.current)||'{"name":"","date":"","items":[],"extraMembers":[]}');

function save(){ localStorage.setItem(K.sessions,JSON.stringify(sessions)); }
function saveCurrent(){ localStorage.setItem(K.current,JSON.stringify(current)); }
function fmt(n){ return Math.round(n).toLocaleString('th-TH'); }
function fmtD(n){ return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function today(){ return new Date().toISOString().split('T')[0]; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

function getMembers(){
  const extra = (document.getElementById('extra-members').value||'').split(',').map(s=>s.trim()).filter(Boolean);
  return ['เจน','กอหญ้า',...extra];
}

function getStoredMembers(session){
  const all = new Set(['เจน','กอหญ้า']);
  session.items.forEach(i=>{ all.add(i.payer); i.participants.forEach(p=>all.add(p)); });
  return [...all];
}

function buildPayerSelect(){
  const sel = document.getElementById('item-payer');
  const members = getMembers();
  sel.innerHTML = members.map(m=>`<option value="${m}">${m}</option>`).join('');
}

function buildChips(){
  const members = getMembers();
  const chips = document.getElementById('participant-chips');
  chips.innerHTML = members.map(m=>{
    const cls = m==='เจน'?'chip-jane':m==='กอหญ้า'?'chip-korya':'chip-other';
    return `<button class="chip ${cls} selected" onclick="toggleChip(this,'${m}')">${m}</button>`;
  }).join('');
}

function toggleChip(el,name){ el.classList.toggle('selected'); }

function getSelectedParticipants(){
  return [...document.querySelectorAll('#participant-chips .chip.selected')].map(c=>c.textContent);
}

function whoClass(name){
  if(name==='เจน') return 'who-jane';
  if(name==='กอหญ้า') return 'who-korya';
  return 'who-other';
}

// Calculate settlement for a list of items
function calcSettle(items, members){
  const paid = {}; const share = {};
  members.forEach(m=>{ paid[m]=0; share[m]=0; });
  items.forEach(item=>{
    const n = item.participants.length || 1;
    const per = item.amount / n;
    if(paid[item.payer]!==undefined) paid[item.payer] += item.amount;
    else paid[item.payer] = item.amount;
    item.participants.forEach(p=>{
      if(share[p]!==undefined) share[p]+=per;
      else share[p]=per;
    });
  });
  // net = paid - share (positive = owed money back, negative = owes money)
  const net = {};
  const allM = new Set([...Object.keys(paid),...Object.keys(share)]);
  allM.forEach(m=>{ net[m]=(paid[m]||0)-(share[m]||0); });
  return { paid, share, net };
}

// Simplify debts to minimal transactions
function simplifyDebts(net){
  const creditors = [], debtors = [];
  Object.entries(net).forEach(([m,v])=>{
    if(v>0.5) creditors.push({m,v});
    else if(v<-0.5) debtors.push({m,v:-v});
  });
  const txns = [];
  let ci=0, di=0;
  while(ci<creditors.length && di<debtors.length){
    const amt = Math.min(creditors[ci].v, debtors[di].v);
    txns.push({from:debtors[di].m, to:creditors[ci].m, amt});
    creditors[ci].v -= amt; debtors[di].v -= amt;
    if(creditors[ci].v < 0.5) ci++;
    if(debtors[di].v < 0.5) di++;
  }
  return txns;
}

function addItem(){
  const name = document.getElementById('item-name').value.trim();
  const amt = parseFloat(document.getElementById('item-amt').value);
  const payer = document.getElementById('item-payer').value;
  const participants = getSelectedParticipants();
  if(!name) return toast('ใส่ชื่อรายการด้วยครับ');
  if(!amt||amt<=0) return toast('ใส่จำนวนเงินด้วยครับ');
  if(!participants.length) return toast('เลือกคนที่ร่วมจ่ายด้วยครับ');

  // save session info
  current.name = document.getElementById('session-name').value || 'บิล ' + (new Date().toLocaleDateString('th-TH',{month:'short',day:'numeric'}));
  current.date = document.getElementById('session-date').value || today();
  current.items.push({id:Date.now(), name, payer, amount:amt, participants});
  saveCurrent();

  document.getElementById('item-name').value='';
  document.getElementById('item-amt').value='';
  buildChips();
  renderPreview();
  toast('เพิ่มแล้ว ✓');
}

function delCurrentItem(id){
  current.items = current.items.filter(i=>i.id!==id);
  saveCurrent();
  renderPreview();
}

function renderPreview(){
  const list = document.getElementById('preview-list');
  const settleEl = document.getElementById('preview-settle');
  if(!current.items.length){
    list.innerHTML='<div class="empty" style="padding:16px 0"><div class="empty-icon">🍽️</div>ยังไม่มีรายการ</div>';
    settleEl.style.display='none';
    return;
  }
  const total = current.items.reduce((s,i)=>s+i.amount,0);
  list.innerHTML = current.items.map(i=>`
    <div class="item-row">
      <span class="item-who ${whoClass(i.payer)}">${i.payer}</span>
      <span class="item-name">${i.name} <span style="font-size:10px;color:var(--text3)">(${i.participants.join(', ')})</span></span>
      <span class="item-amt">${fmt(i.amount)}</span>
      <button class="del-btn" onclick="delCurrentItem(${i.id})">✕</button>
    </div>`).join('');
  list.innerHTML += `<div class="item-row" style="font-weight:500;margin-top:4px"><span style="flex:1;color:var(--text2)">รวมทั้งหมด</span><span style="color:var(--coral);font-size:16px">${fmt(total)} บ.</span></div>`;

  const members = getStoredMembers(current);
  const {net} = calcSettle(current.items, members);
  const txns = simplifyDebts(net);
  settleEl.style.display='block';
  settleEl.innerHTML = txns.length ? txns.map(t=>`
    <div class="settle-box owe">
      <div class="settle-icon">💸</div>
      <div><div class="settle-text">${t.from} โอนให้ ${t.to} <span>${fmtD(t.amt)} บ.</span></div></div>
    </div>`).join('') :
    `<div class="settle-box even"><div class="settle-icon">✅</div><div class="settle-text">เท่ากันพอดี!</div></div>`;
}

function saveSession(){
  if(!current.items.length) return toast('ยังไม่มีรายการ');
  current.name = document.getElementById('session-name').value || 'บิล ' + (new Date().toLocaleDateString('th-TH',{month:'short',day:'numeric'}));
  current.date = document.getElementById('session-date').value || today();
  sessions.unshift({...current, id:Date.now()});
  save();
  current = {name:'',date:'',items:[],extraMembers:[]};
  saveCurrent();
  document.getElementById('session-name').value='';
  document.getElementById('session-date').value='';
  document.getElementById('extra-members').value='';
  buildPayerSelect(); buildChips(); renderPreview();
  toast('บันทึกบิลแล้ว ✓');
  showTab('sessions');
}

function clearCurrent(){
  if(!current.items.length) return;
  if(!confirm('ล้างรายการทั้งหมดในบิลนี้?')) return;
  current.items=[];
  saveCurrent();
  renderPreview();
}

function delSession(id){
  if(!confirm('ลบบิลนี้?')) return;
  sessions=sessions.filter(s=>s.id!==id);
  save();
  renderSessions();
  renderSummaryTab();
}

function renderSessions(){
  const el=document.getElementById('sessions-list');
  if(!sessions.length){ el.innerHTML='<div class="empty"><div class="empty-icon">🧾</div>ยังไม่มีบิลที่บันทึกไว้</div>'; return; }
  el.innerHTML=sessions.map(s=>{
    const total=s.items.reduce((sum,i)=>sum+i.amount,0);
    const members=getStoredMembers(s);
    const {net}=calcSettle(s.items,members);
    const txns=simplifyDebts(net);
    const settleHtml = txns.length ? txns.map(t=>`
      <div class="settle-box owe" style="margin-top:8px">
        <div class="settle-icon" style="font-size:16px">💸</div>
        <div class="settle-text" style="font-size:13px">${t.from} โอน ${t.to} <span style="font-size:15px">${fmtD(t.amt)} บ.</span></div>
      </div>`).join('') :
      `<div class="settle-box even" style="margin-top:8px"><div class="settle-icon" style="font-size:16px">✅</div><div class="settle-text" style="font-size:13px">เท่ากันพอดี!</div></div>`;
    return `<div class="session-card">
      <div class="session-header-row">
        <div><div class="session-title">${s.name}</div><div class="session-date">${s.date}</div></div>
        <button class="del-btn" onclick="delSession(${s.id})" style="font-size:18px">🗑</button>
      </div>
      <div class="session-total">${fmt(total)} บาท</div>
      <div class="item-list">${s.items.map(i=>`
        <div class="item-row">
          <span class="item-who ${whoClass(i.payer)}">${i.payer}</span>
          <span class="item-name">${i.name}</span>
          <span class="item-amt">${fmt(i.amount)}</span>
        </div>`).join('')}
      </div>
      ${settleHtml}
    </div>`;
  }).join('');
}

function renderSummaryTab(){
  // Totals per person
  const totals={เจน:{paid:0,share:0},กอหญ้า:{paid:0,share:0}};
  sessions.forEach(s=>{
    s.items.forEach(i=>{
      const n=i.participants.length||1;
      const per=i.amount/n;
      if(totals[i.payer]) totals[i.payer].paid+=i.amount;
      i.participants.forEach(p=>{ if(totals[p]) totals[p].share+=per; });
    });
  });
  const grandTotal = sessions.reduce((s,se)=>s+se.items.reduce((ss,i)=>ss+i.amount,0),0);

  document.getElementById('summary-totals').innerHTML=`
    <div class="sum-item"><div class="sum-label">รวมทั้งหมด</div><div class="sum-val coral">${fmt(grandTotal)}</div></div>
    <div class="sum-item"><div class="sum-label">เจนจ่าย</div><div class="sum-val coral">${fmt(totals['เจน'].paid)}</div></div>
    <div class="sum-item"><div class="sum-label">กอหญ้าจ่าย</div><div class="sum-val teal">${fmt(totals['กอหญ้า'].paid)}</div></div>
    <div class="sum-item"><div class="sum-label">จำนวนบิล</div><div class="sum-val gold">${sessions.length}</div></div>`;

  // Overall net
  const allItems = sessions.flatMap(s=>s.items);
  const allMembers = ['เจน','กอหญ้า'];
  const {net} = calcSettle(allItems, allMembers);
  const txns = simplifyDebts(net);
  const settleEl = document.getElementById('summary-settle');
  settleEl.innerHTML = `<div class="form-title">💰 ยอดรวมทุกบิล</div>` + (txns.length ? txns.map(t=>`
    <div class="settle-box owe">
      <div class="settle-icon">💸</div>
      <div><div class="settle-text">${t.from} ยังต้องโอน ${t.to} <span>${fmtD(t.amt)} บ.</span></div>
      <div class="settle-sub">รวมทุกบิลที่ยังไม่ได้คืน</div></div>
    </div>`).join('') :
    `<div class="settle-box even"><div class="settle-icon">🎉</div><div><div class="settle-text">เท่ากันหมดทุกบิล!</div><div class="settle-sub">ไม่มีใครค้างใคร</div></div></div>`);

  const sumSess = document.getElementById('summary-sessions');
  sumSess.innerHTML = sessions.length ? `<div style="font-size:12px;color:var(--text3);margin-bottom:8px;padding:0 4px">บิลล่าสุด ${sessions.length} รายการ</div>` + sessions.slice(0,5).map(s=>{
    const total=s.items.reduce((sum,i)=>sum+i.amount,0);
    return `<div class="session-card" style="padding:12px 14px"><div class="session-header-row"><div><div style="font-size:14px;font-weight:500">${s.name}</div><div class="session-date">${s.date}</div></div><div style="font-size:16px;font-weight:600;color:var(--coral)">${fmt(total)} บ.</div></div></div>`;
  }).join('') : '';
}

function showTab(id){
  ['add','sessions','summary'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===id);
    document.querySelectorAll('.tab')[['add','sessions','summary'].indexOf(t)].classList.toggle('active',t===id);
  });
  if(id==='sessions') renderSessions();
  if(id==='summary') renderSummaryTab();
}

// Init
document.getElementById('session-date').value=today();
buildPayerSelect();
buildChips();
renderPreview();

document.getElementById('extra-members').addEventListener('input',()=>{ buildPayerSelect(); buildChips(); });
</script>
</body>
</html>
